<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Circle</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="main-header">
      <button class="hamburger-btn" id="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </button>
      <img src="project-assets/logos/circle.svg" alt="Circle Logo" />
      <nav>
        <ul class="navbar" id="navbar-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="services.html">Services</a></li>
        </ul>
      </nav>
      <a href="contact.html" class="btn">Contact Us</a>
    </header>

    <section class="contact-page">
      <h1>Contact Us</h1>
      <form action="contact" class="name-form">
        <label for="name" class="label-form">Full name *</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Enter your full name"
        />

        <div class="form-inline">
          <div class="column-form">
            <label for="email" class="label-form">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email address"
            />
          </div>
          <div class="column-form">
            <label for="phone" class="label-form">Phone</label>
            <input
              type="text"
              id="phone"
              name="phone"
              placeholder="Enter your phone number"
            />
          </div>
        </div>

        <label for="message" class="label-form">Message</label>
        <textarea
          id="message"
          name="message"
          placeholder="Write your message here"
        ></textarea>
        <button type="submit" class="btn submit">Submit</button>
      </form>
    </section>

    <footer>
      <div class="address-info">
        <img src="project-assets/logos/circle.svg" alt="Circle logo" />
        <address>2972 Westheimer Rd. Santa Ana,<br />Illinois 85486</address>
      </div>

      <ul class="footer-info">
        <li><a href="team.html">Team</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="press.html">Press</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="privacy.html">Privacy Policy</a></li>
      </ul>
    </footer>
    <script src="js/main.js"></script>
    <script src="js/contact.js"></script>
  </body>
</html>
