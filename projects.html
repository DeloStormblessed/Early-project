<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />

    <link rel="stylesheet" href="css/style.css" />

  <body>
    <header class="main-header">
      <button class="hamburger-btn" id="menu-toggle">
        <span></span>
        <span></span>
        <span></span>

      <img src="project-assets/logos/circle.svg" alt="Circle Logo" />
      <nav>
        <ul class="navbar" id="navbar-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="services.html">Services</a></li>
        </ul>
      </nav>
      <a href="contact.html" class="btn">Contact Us</a>
    </header>

    <article class="article-project">
      <h1 id="nombre"></h1>
      <div class="author-date-project">
        <p id="descripcion"></p>
        <p>Completed on <span id="fecha-completado"></span></p>
      </div>
      <img id="imagen" src="" alt="projects image" />
      <div class="article-project-content">
        <p id="contenido"></p>
      </div>
    </article>

    <section id="projects">
      <h3>Other Projects</h3>
      <div class="cards-container">
        <div class="project card">
          <img src="" alt="Simplify photo" />
          <h4></h4>
          <p></p>
          <a href="projects.html">Learn more</a>
        </div>

        <div class="project card">
          <img src="" alt="Dashcoin photo" />

          <p></p>

          <p></p>
          <a href="projects.html">Learn more</a>
        </div>
      </div>
    </section>

    <section id="newsletter">
      <div class="newsletter-container">
        <div class="newsletter-text-container">
          <h3>Do you have any questions?</h3>
          <aside>Let us help you!</aside>
        </div>
        <form action="subcribe" class="newsletter-form">
          <label for="email"></label>
          <div class="form-input">
            <img
              src="project-assets/newsletter/icon/mail.svg"
              alt="email icon"
            />
            <input
              type="email"
              name="email"
              id="email"
              placeholder="Enter your email"
              required
            />
          </div>
          <button type="submit" class="btn form-submit">Subscribe</button>
        </form>
      </div>
    </section>

    <footer>
      <div class="address-info">
        <img src="project-assets/logos/circle.svg" alt="Circle logo" />
        <address>2972 Westheimer Rd. Santa Ana,<br />Illinois 85486</address>
      </div>

      <ul class="footer-info">
        <li><a href="team.html">Team</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="about.html">About Us</a></li>
